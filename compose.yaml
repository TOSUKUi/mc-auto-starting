services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    group_add:
      - "${DOCKER_GID:-65534}"
    working_dir: /app
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      HOME: /tmp
      BUNDLE_PATH: /app/vendor/bundle
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_USERNAME: ${DB_USERNAME:-app}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME_DEVELOPMENT: ${DB_NAME_DEVELOPMENT:-mc_auto_starting_development}
      DB_NAME_TEST: ${DB_NAME_TEST:-mc_auto_starting_test}
      DB_NAME_PRODUCTION: ${DB_NAME_PRODUCTION:-mc_auto_starting_production}
      DOCKER_ENGINE_SOCKET_PATH: ${DOCKER_ENGINE_SOCKET_PATH:-/var/run/docker.sock}
      DOCKER_ENGINE_API_VERSION: ${DOCKER_ENGINE_API_VERSION:-}
      DOCKER_ENGINE_OPEN_TIMEOUT: ${DOCKER_ENGINE_OPEN_TIMEOUT:-5}
      DOCKER_ENGINE_READ_TIMEOUT: ${DOCKER_ENGINE_READ_TIMEOUT:-30}
      DOCKER_ENGINE_WRITE_TIMEOUT: ${DOCKER_ENGINE_WRITE_TIMEOUT:-30}
      MINECRAFT_PUBLIC_DOMAIN: ${MINECRAFT_PUBLIC_DOMAIN:-mc.tosukui.xyz}
      MINECRAFT_PUBLIC_PORT: ${MINECRAFT_PUBLIC_PORT:-42434}
      MINECRAFT_RUNTIME_IMAGE: ${MINECRAFT_RUNTIME_IMAGE:-itzg/minecraft-server}
      MINECRAFT_RUNTIME_VANILLA_IMAGE: ${MINECRAFT_RUNTIME_VANILLA_IMAGE:-itzg/minecraft-server}
      MINECRAFT_RUNTIME_VANILLA_VERSION_MANIFEST_URL: ${MINECRAFT_RUNTIME_VANILLA_VERSION_MANIFEST_URL:-https://piston-meta.mojang.com/mc/game/version_manifest_v2.json}
      MINECRAFT_RUNTIME_PAPER_VERSION_MANIFEST_URL: ${MINECRAFT_RUNTIME_PAPER_VERSION_MANIFEST_URL:-https://qing762.is-a.dev/api/papermc}
      MINECRAFT_RUNTIME_VERSION_OPTIONS_CACHE_TTL: ${MINECRAFT_RUNTIME_VERSION_OPTIONS_CACHE_TTL:-300}
      MINECRAFT_RUNTIME_NETWORK_NAME: ${MINECRAFT_RUNTIME_NETWORK_NAME:-mc_router_net}
      MC_ROUTER_ROUTES_CONFIG_PATH: ${MC_ROUTER_ROUTES_CONFIG_PATH:-/app/tmp/mc-router/routes.json}
      MC_ROUTER_RELOAD_STRATEGY: ${MC_ROUTER_RELOAD_STRATEGY:-docker_signal}
      MC_ROUTER_RELOAD_COMMAND: ${MC_ROUTER_RELOAD_COMMAND:-}
      MC_ROUTER_RELOAD_SIGNAL: ${MC_ROUTER_RELOAD_SIGNAL:-HUP}
      MC_ROUTER_RELOAD_CONTAINER_LABELS: ${MC_ROUTER_RELOAD_CONTAINER_LABELS:-app.kubos.dev/component=mc-router}
      MC_ROUTER_API_URL: ${MC_ROUTER_API_URL:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
      BOOTSTRAP_DISCORD_USER_ID: ${BOOTSTRAP_DISCORD_USER_ID:-}
      BOOTSTRAP_DISCORD_USERNAME: ${BOOTSTRAP_DISCORD_USERNAME:-}
      BOOTSTRAP_EMAIL_ADDRESS: ${BOOTSTRAP_EMAIL_ADDRESS:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_BOT_PUBLIC_KEY: ${DISCORD_BOT_PUBLIC_KEY:-}
      DISCORD_BOT_APPLICATION_ID: ${DISCORD_BOT_APPLICATION_ID:-}
      DISCORD_BOT_SHARED_SECRET: ${DISCORD_BOT_SHARED_SECRET:-}
      RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}
    ports:
      - "3000:3000"
      - "3036:3036"
    command: bash -lc "bin/dev"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - mc_router

  mc-router:
    image: ${MC_ROUTER_IMAGE:-itzg/mc-router}
    labels:
      app.kubos.dev/component: mc-router
    environment:
      PORT: 25565
      ROUTES_CONFIG: /config/routes.json
    volumes:
      - ./tmp/mc-router:/config
    ports:
      - "${MINECRAFT_PUBLIC_PORT:-42434}:25565"
    restart: unless-stopped
    networks:
      - mc_router

  db:
    image: mariadb:10.11.16
    env_file:
      - .env
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MARIADB_DATABASE: ${DB_NAME_DEVELOPMENT:-mc_auto_starting_development}
      MARIADB_USER: ${DB_USERNAME:-app}
      MARIADB_PASSWORD: ${DB_PASSWORD:-password}
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p${DB_ROOT_PASSWORD:-rootpassword} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    volumes:
      - redis_data:/data

volumes:
  mariadb_data:
  redis_data:

networks:
  mc_router:
    name: ${MINECRAFT_RUNTIME_NETWORK_NAME:-mc_router_net}
    external: true
