services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    working_dir: /app
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      HOME: /tmp
      BUNDLE_PATH: /app/vendor/bundle
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: app
      DB_PASSWORD: password
      DOCKER_ENGINE_SOCKET_PATH: /var/run/docker.sock
      MINECRAFT_PUBLIC_DOMAIN: mc.tosukui.xyz
      MINECRAFT_PUBLIC_PORT: 42434
      MINECRAFT_RUNTIME_IMAGE: itzg/minecraft-server
      MINECRAFT_RUNTIME_NETWORK_NAME: mc_router_net
      MC_ROUTER_ROUTES_CONFIG_PATH: /app/tmp/mc-router/routes.json
      MC_ROUTER_RELOAD_STRATEGY: watch
    ports:
      - "3000:3000"
      - "3036:3036"
    command: bash -lc "bin/dev"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: mariadb:10.11.16
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: mc_auto_starting_development
      MARIADB_USER: app
      MARIADB_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -prootpassword --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    volumes:
      - redis_data:/data

volumes:
  mariadb_data:
  redis_data:
