service: mc-auto-starting
image: <%= ENV.fetch("KAMAL_IMAGE") %>
require_destination: true
hooks_path: .kamal/hooks
secrets_path: .kamal/secrets
asset_path: /rails/public/assets

registry:
  server: <%= ENV.fetch("KAMAL_REGISTRY_SERVER", "docker.io") %>
  username: <%= ENV.fetch("KAMAL_REGISTRY_USERNAME") %>
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    RAILS_ENV: production
    RAILS_LOG_LEVEL: <%= ENV.fetch("RAILS_LOG_LEVEL", "info") %>
    DB_HOST: mc-auto-starting-mariadb
    DB_PORT: "3306"
    DB_USERNAME: <%= ENV.fetch("DB_USERNAME", "app_user") %>
    DB_NAME_PRODUCTION: <%= ENV.fetch("DB_NAME_PRODUCTION", "app_production") %>
    REDIS_URL: redis://mc-auto-starting-redis:6379/1
    DOCKER_ENGINE_SOCKET_PATH: /var/run/docker.sock
    DOCKER_ENGINE_OPEN_TIMEOUT: <%= ENV.fetch("DOCKER_ENGINE_OPEN_TIMEOUT", "5") %>
    DOCKER_ENGINE_READ_TIMEOUT: <%= ENV.fetch("DOCKER_ENGINE_READ_TIMEOUT", "30") %>
    DOCKER_ENGINE_WRITE_TIMEOUT: <%= ENV.fetch("DOCKER_ENGINE_WRITE_TIMEOUT", "30") %>
    MINECRAFT_PUBLIC_DOMAIN: <%= ENV.fetch("MINECRAFT_PUBLIC_DOMAIN") %>
    MINECRAFT_PUBLIC_PORT: <%= ENV.fetch("MINECRAFT_PUBLIC_PORT") %>
    MINECRAFT_RUNTIME_IMAGE: <%= ENV.fetch("MINECRAFT_RUNTIME_IMAGE", "itzg/minecraft-server") %>
    MINECRAFT_RUNTIME_VANILLA_IMAGE: <%= ENV.fetch("MINECRAFT_RUNTIME_VANILLA_IMAGE", "itzg/minecraft-server") %>
    MINECRAFT_RUNTIME_VANILLA_VERSION_MANIFEST_URL: <%= ENV.fetch("MINECRAFT_RUNTIME_VANILLA_VERSION_MANIFEST_URL", "https://piston-meta.mojang.com/mc/game/version_manifest_v2.json") %>
    MINECRAFT_RUNTIME_PAPER_VERSION_MANIFEST_URL: <%= ENV.fetch("MINECRAFT_RUNTIME_PAPER_VERSION_MANIFEST_URL", "https://qing762.is-a.dev/api/papermc") %>
    MINECRAFT_RUNTIME_VERSION_OPTIONS_CACHE_TTL: <%= ENV.fetch("MINECRAFT_RUNTIME_VERSION_OPTIONS_CACHE_TTL", "300") %>
    MINECRAFT_RUNTIME_NETWORK_NAME: <%= ENV.fetch("MINECRAFT_RUNTIME_NETWORK_NAME", "mc_router_net") %>
    MC_ROUTER_ROUTES_CONFIG_PATH: /rails/shared/mc-router/routes.json
    MC_ROUTER_RELOAD_STRATEGY: docker_signal
    MC_ROUTER_RELOAD_SIGNAL: <%= ENV.fetch("MC_ROUTER_RELOAD_SIGNAL", "HUP") %>
    MC_ROUTER_RELOAD_CONTAINER_LABELS: <%= ENV.fetch("MC_ROUTER_RELOAD_CONTAINER_LABELS", "app.kubos.dev/component=mc-router") %>
    APP_BASE_URL: <%= ENV.fetch("APP_BASE_URL") %>
  secret:
    - RAILS_MASTER_KEY
    - APP_DATABASE_PASSWORD:DB_PASSWORD
    - DISCORD_CLIENT_ID
    - DISCORD_CLIENT_SECRET
    - DISCORD_BOT_TOKEN
    - DISCORD_BOT_PUBLIC_KEY
    - DISCORD_BOT_APPLICATION_ID
    - DISCORD_BOT_SHARED_SECRET

volumes:
  - /var/run/docker.sock:/var/run/docker.sock
  - /var/lib/mc-auto-starting/shared/mc-router:/rails/shared/mc-router
  - /var/lib/mc-auto-starting/shared/storage:/rails/storage

accessories:
  mariadb:
    service: mc-auto-starting-mariadb
    image: mariadb:10.11.16
    roles:
      - web
    env:
      clear:
        MARIADB_DATABASE: <%= ENV.fetch("DB_NAME_PRODUCTION", "app_production") %>
        MARIADB_USER: <%= ENV.fetch("DB_USERNAME", "app_user") %>
      secret:
        - MARIADB_PASSWORD:DB_PASSWORD
        - MARIADB_ROOT_PASSWORD:DB_ROOT_PASSWORD
    directories:
      - /var/lib/mc-auto-starting/accessories/mariadb:/var/lib/mysql
  redis:
    service: mc-auto-starting-redis
    image: redis:7
    roles:
      - web
    directories:
      - /var/lib/mc-auto-starting/accessories/redis:/data
